<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday ✨</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(255, 192, 203, 0.25), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(168, 85, 247, 0.18), transparent 22%),
        radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.12), transparent 24%),
        linear-gradient(135deg, #120815, #1d0d2a, #0f1020);
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.8;
    }

    body::before {
      width: 320px;
      height: 320px;
      background: rgba(236, 72, 153, 0.18);
      top: -80px;
      left: -80px;
      animation: floatBlob1 12s ease-in-out infinite alternate;
    }

    body::after {
      width: 360px;
      height: 360px;
      background: rgba(168, 85, 247, 0.16);
      bottom: -110px;
      right: -100px;
      animation: floatBlob2 14s ease-in-out infinite alternate;
    }

    @keyframes floatBlob1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 60px) scale(1.1); }
    }

    @keyframes floatBlob2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-60px, -50px) scale(1.12); }
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.35),
        0 0 30px rgba(236, 72, 153, 0.12),
        0 0 40px rgba(168, 85, 247, 0.10);
    }

    .hero-title {
      text-shadow: 0 6px 30px rgba(0, 0, 0, 0.35);
      animation: popIn 0.8s ease both;
    }

    .hero-sub {
      animation: fadeUp 1s ease 0.15s both;
    }

    .photo-wrap {
      animation: fadeUp 1s ease 0.25s both;
    }

    .btn-glow {
      box-shadow:
        0 10px 30px rgba(236, 72, 153, 0.25),
        0 0 20px rgba(168, 85, 247, 0.18);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .btn-glow:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 16px 34px rgba(236, 72, 153, 0.32),
        0 0 28px rgba(168, 85, 247, 0.22);
    }

    .photo-card {
      position: relative;
      overflow: hidden;
      border-radius: 1.75rem;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .photo-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.35),
        0 0 30px rgba(236, 72, 153, 0.16);
    }

    .photo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 20%,
        rgba(255, 255, 255, 0.2) 50%,
        transparent 80%
      );
      transform: translateX(-120%);
      z-index: 1;
    }

    .photo-card:hover::before {
      animation: shine 1.1s ease;
    }

    @keyframes shine {
      100% { transform: translateX(120%); }
    }

    .photo {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .photo-card:hover .photo {
      transform: scale(1.06);
    }

    .floating {
      animation: floatUp 6s ease-in-out infinite;
    }

    .floating:nth-child(2) {
      animation-delay: 1s;
    }

    .floating:nth-child(3) {
      animation-delay: 2s;
    }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 9999;
      animation: fall 2.4s linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .balloon {
      position: absolute;
      width: 22px;
      height: 28px;
      border-radius: 50% 50% 45% 45%;
      opacity: 0.16;
      filter: blur(0.2px);
      animation: rise 14s linear infinite;
    }

    .balloon::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 22px;
      background: rgba(255,255,255,0.18);
      left: 10px;
      top: 26px;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) translateX(0) scale(1);
      }
      100% {
        transform: translateY(-110vh) translateX(40px) scale(1.15);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(14px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .photo {
        height: 320px;
      }
    }

    @media (max-width: 480px) {
      .photo {
        height: 280px;
      }
    }
  </style>
</head>

<body class="text-white">
  <div class="balloon" style="left:8%; bottom:-40px; background:#ec4899; animation-delay:0s;"></div>
  <div class="balloon" style="left:22%; bottom:-60px; background:#a855f7; animation-delay:3s;"></div>
  <div class="balloon" style="left:78%; bottom:-50px; background:#f472b6; animation-delay:6s;"></div>
  <div class="balloon" style="left:90%; bottom:-70px; background:#c084fc; animation-delay:9s;"></div>

  <main class="max-w-4xl mx-auto px-5 py-8 sm:py-12">
    <section class="glass rounded-[2rem] px-5 sm:px-8 py-10 sm:py-12 text-center">
      <p class="uppercase tracking-[0.35em] text-pink-200/80 text-xs sm:text-sm">
        Birthday Surprise
      </p>

      <h1 class="hero-title mt-4 text-4xl sm:text-5xl md:text-6xl font-black">
        Happy Birthday! 🎂
      </h1>

      <p class="hero-sub mt-4 text-white/75 max-w-2xl mx-auto text-sm sm:text-base leading-7">
        Have a lovely day, lots of smiles, and a year full of good moments.
      </p>

      <div class="photo-wrap mt-10 max-w-2xl mx-auto">
        <div class="photo-card glass p-3 sm:p-4 floating">
          <img
            src="./image/img1.jpg"
            alt="Birthday Photo"
            class="photo rounded-[1.5rem]"
          />
        </div>
      </div>

      <div class="mt-8">
        <button
          id="openMsgBtn"
          class="btn-glow inline-flex items-center gap-2 rounded-full bg-pink-500/90 px-6 py-3 font-semibold text-white hover:bg-pink-500"
        >
          🎁 Open My Message
        </button>
      </div>
    </section>
  </main>

  <script>
    function launchConfettiBurst() {
      const colors = ["#ec4899", "#a855f7", "#ffffff", "#f472b6", "#c084fc", "#f9a8d4"];
      for (let i = 0; i < 90; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (6 + Math.random() * 8) + "px";
        piece.style.height = (10 + Math.random() * 12) + "px";
        piece.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
        piece.style.animationDuration = (1.8 + Math.random() * 1.4) + "s";
        piece.style.opacity = (0.7 + Math.random() * 0.3);
        document.body.appendChild(piece);

        setTimeout(() => piece.remove(), 2600);
      }
    }

    function launchSparkleBurst() {
      const colors = ["#ffffff", "#fde68a", "#f9a8d4", "#c084fc"];
      for (let i = 0; i < 28; i++) {
        const piece = document.createElement("div");
        piece.style.position = "fixed";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.top = Math.random() * 35 + "vh";
        piece.style.zIndex = "10000";
        piece.style.pointerEvents = "none";
        piece.style.fontSize = (14 + Math.random() * 16) + "px";
        piece.style.color = colors[Math.floor(Math.random() * colors.length)];
        piece.style.textShadow = "0 0 10px rgba(255,255,255,0.55)";
        piece.style.animation = `sparkPop ${(1.2 + Math.random() * 0.9)}s ease-out forwards`;
        piece.textContent = ["✨", "🌟", "💖", "⭐"][Math.floor(Math.random() * 4)];
        document.body.appendChild(piece);

        setTimeout(() => piece.remove(), 2600);
      }
    }

    const sparkleStyle = document.createElement("style");
    sparkleStyle.textContent = `
      @keyframes sparkPop {
        0%   { transform: translateY(10px) scale(.4) rotate(0deg); opacity: 0; }
        20%  { transform: translateY(0) scale(1.1) rotate(15deg); opacity: 1; }
        70%  { transform: translateY(-18px) scale(1) rotate(60deg); opacity: 1; }
        100% { transform: translateY(-40px) scale(.2) rotate(120deg); opacity: 0; }
      }
    `;
    document.head.appendChild(sparkleStyle);

    window.addEventListener("load", () => {
      launchConfettiBurst();
      setTimeout(() => {
        launchConfettiBurst();
        launchSparkleBurst();
      }, 700);

      setInterval(() => {
        launchSparkleBurst();
      }, 1800);
    });

    document.getElementById("openMsgBtn").addEventListener("click", () => {
      launchConfettiBurst();
      launchSparkleBurst();

      Swal.fire({
        width: 480,
        padding: "1.4rem",
        background: "linear-gradient(135deg,#1b1028,#24163b)",
        color: "#fff",
        showConfirmButton: true,
        confirmButtonText: "😂 Yeah Whatever",
        confirmButtonColor: "#ec4899",
        allowOutsideClick: false,
        customClass: {
          popup: "birthday-popup",
          htmlContainer: "birthday-html"
        },
        html: `
<style>
  .birthday-popup{
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 28px !important;
    overflow: hidden !important;
  }

  .birthday-html{
    overflow-x: hidden !important;
  }

  @keyframes sparkle{
    0%,100%{
      transform:scale(1);
      opacity:1;
    }
    50%{
      transform:scale(1.4);
      opacity:.5;
    }
  }

  @keyframes float{
    0%,100%{
      transform:translateY(0px);
    }
    50%{
      transform:translateY(-10px);
    }
  }

  @keyframes fadeUp{
    from{
      opacity:0;
      transform:translateY(25px);
    }
    to{
      opacity:1;
      transform:translateY(0);
    }
  }

  .popup-top{
    position:relative;
    height:110px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:2px;
  }

  .cake{
    font-size:56px;
    z-index:2;
    animation:float 2s ease-in-out infinite;
  }

  .sparkle{
    position:absolute;
    font-size:18px;
    opacity:0;
    animation:sparkle 2.2s infinite;
  }

  .sparkle.s1{ top:8px; left:38%; animation-delay:0s; }
  .sparkle.s2{ top:18px; left:58%; animation-delay:.35s; }
  .sparkle.s3{ top:36px; left:30%; animation-delay:.7s; }
  .sparkle.s4{ top:28px; left:70%; animation-delay:1.05s; }
  .sparkle.s5{ top:0px; left:50%; animation-delay:1.4s; }
  .sparkle.s6{ top:48px; left:47%; animation-delay:1.75s; }

  .title{
    font-size:30px;
    font-weight:800;
    color:#ffd166;
    text-shadow:0 0 20px rgba(255,209,102,.4);
    animation:fadeUp .6s;
  }

  .badge{
    display:inline-block;
    margin-top:14px;
    padding:8px 18px;
    background:rgba(255,255,255,.12);
    border-radius:30px;
    border:1px solid rgba(255,255,255,.15);
    animation:fadeUp .8s;
  }

  .msg{
    margin-top:18px;
    font-size:16px;
    line-height:1.9;
    animation:fadeUp 1s;
  }

  .footer{
    margin-top:22px;
    font-size:14px;
    opacity:.8;
    animation:fadeUp 1.2s;
  }
</style>

<div>
  <div class="popup-top">
    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">🌟</div>
    <div class="sparkle s3">💖</div>
    <div class="sparkle s4">⭐</div>
    <div class="sparkle s5">✨</div>
    <div class="sparkle s6">🌟</div>
    <div class="cake">🎂</div>
  </div>

  <div class="title">Happy Birthday!</div>

  <div class="badge">🎉 Special Message 🎉</div>

  <div class="msg">
    Special thanks for skipping classes... 😂

    <br><br>

    Because that's where some of the best memories started. 😎

    <br><br>

    Stay awesome,<br>
    keep smiling,<br>
    and never change.

    🎉✨
  </div>

  <!--<div class="footer">
    ⭐ Friendship Level :
    ██████████ 100%
  </div>-->
</div>
        `
      });
    });
  </script>
</body>
</html>
